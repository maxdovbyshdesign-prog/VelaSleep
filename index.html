<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VelaSleep | Concept 01 (Pacaembu Edition)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* ПОДКЛЮЧЕНИЕ ВАШИХ ШРИФТОВ */
        /* Убедитесь, что названия файлов в папке /fonts/ совпадают с именами ниже */
        
        @font-face {
            font-family: 'Pacaembu';
            src: url('fonts/Pacaembu-Bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }

        @font-face {
            font-family: 'Pacaembu';
            src: url('fonts/Pacaembu-SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-style: normal;
        }

        @font-face {
            font-family: 'Pacaembu';
            src: url('fonts/Pacaembu-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'Pacaembu';
            src: url('fonts/Pacaembu-Light.woff2') format('woff2');
            font-weight: 300;
            font-style: normal;
        }

        :root {
            --cloud: #F8FAFB;
            --mist: #EAF7FC;
            --blue: #A8DDEE;
            --pink: #E6A3C8;
            --gray: #D9E1E6;
        }

        body {
            font-family: 'Pacaembu', sans-serif; /* Применяем ваш шрифт ко всему сайту */
            background-color: var(--cloud);
            color: #2D3748;
            scroll-behavior: smooth;
        }

        h1, h2, .logo-text { font-weight: 700; }
        h3 { font-weight: 600; }
        p { font-weight: 400; }
        .small-text { font-weight: 300; }

        .btn-primary {
            background-color: var(--blue);
            color: white;
            padding: 14px 36px;
            border-radius: 99px;
            font-weight: 700; /* Bold по гайдлайну */
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(168, 221, 238, 0.6);
        }

        .nav-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(217, 225, 230, 0.5);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="fixed w-full z-50 nav-glass py-5 px-10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <img src="logo.png" alt="VelaSleep" class="h-8">
            <nav class="hidden md:flex space-x-12 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
                <a href="#product" class="hover:text-sky-400 transition-colors">Pillows</a>
                <a href="#wellness" class="hover:text-sky-400 transition-colors">Science</a>
                <a href="#shop" class="hover:text-sky-400 transition-colors">Shop</a>
            </nav>
            <a href="#shop" class="btn-primary text-[12px] py-2.5 px-8 uppercase tracking-widest">Order Now</a>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="min-h-screen flex items-center pt-20 px-10 relative overflow-hidden" style="background: linear-gradient(135deg, #F8FAFB 0%, #EAF7FC 100%);">
        <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
            <div>
                <span class="inline-block px-4 py-1 rounded-full border border-[#E6A3C8]/40 text-[#E6A3C8] text-[10px] font-bold uppercase tracking-widest mb-8">Concept 01 — Cool & Fresh</span>
                <h1 class="text-6xl md:text-[5.5rem] font-bold leading-[0.9] tracking-tighter mb-8">
                    Wake up <br><span style="color: var(--blue)">restored.</span>
                </h1>
                <p class="text-xl text-slate-500 mb-12 max-w-md leading-relaxed font-light">
                    The premium ergonomic pillow designed for cervical health and a breathable night’s sleep.
                </p>
                <div class="flex gap-4">
                    <a href="#shop" class="btn-primary">Shop Collection</a>
                </div>
            </div>
            <div class="relative">
                <img src="hero.jpg" alt="VelaSleep" class="rounded-[60px] shadow-2xl">
            </div>
        </div>
    </section>

    <!-- Остальные секции будут автоматически использовать Pacaembu -->
    <section id="product" class="py-32 bg-white text-center">
        <div class="max-w-3xl mx-auto px-10">
            <h2 class="text-5xl font-bold mb-6">Engineered for <span class="text-[#E6A3C8]">Wellness.</span></h2>
            <p class="text-slate-500 text-lg font-light">Designed by sleep experts using the soft, modern curves of Pacaembu design language.</p>
        </div>
    </section>

</body>
</html>
